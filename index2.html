<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- CSS only -->
    <link rel="stylesheet" href="banner.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-0evHe/X+R7YkIZDRvuzKMRqM+OrBnVFBL6DOitfPri4tjfHxaWutUpFmBp4vmVor" crossorigin="anonymous">
    <title>Bootstrap demo</title>
    
<style>
body{
  background: rgb(206, 204, 204);
  color: rgb(248, 112, 0);
}
.padre{
  border: 4px solid green;
  display: flex;
  justify-content: space-around;
  flex-wrap: wrap;
}
.hijo{
  margin: 10px;
  width: 50px;
  height: 50px;
  border: 2px solid black;
}
.hijo1{
  background: orangered;
}
.hijo2{
  background: red;
}
.hijo3{
  background: violet;
}
.hijo4{
  background: yellow;
}
.buscador__lupaDentroDiv{
  display: flex;
}
.form-control{
  border-radius: 20px;
  width: 300px;
}
.lupa{
  display: flex;
  align-items: center;
}

</style>
  
  </head>
  <body>
    
    <div class="padre">
      <div class="hijo hijo1"></div>
      <div class="hijo hijo2"></div>
      <div class="hijo hijo3"></div>
      <div class="hijo hijo4"></div>
    </div>

    <div class="buscador mb-3">
      <h2>Habla con nosotros</h2>
      <div class="buscador__lupaDentroDiv">
        <input type="name" class="form-control" id="nombre" placeholder="Nombre">
        <!-- <div class="lupa"><i class="fa-solid fa-magnifying-glass fa-lg"></i></div> -->
      </div>
    </div>

    <script src="https://kit.fontawesome.com/89b03c48a4.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/js/bootstrap.bundle.min.js" integrity="sha384-pprn3073KE6tl6bjs2QrFaJGz5/SUsLqktiwsUTF55Jfv3qYSDhgCecCxMW52nD2" crossorigin="anonymous"></script>
  </body>
</html>
