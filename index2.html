<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- CSS only -->
    <link rel="stylesheet" href="banner.css">
    <title>Bootstrap demo</title>
    
<style>
  body{
    background: gainsboro;
  }
  
  .contenedor, .logoAluraYsobreNosotros{
    display: flex;
    justify-content: center;
  }
  .fixed{
    margin: 0;
  font-size: larger;
  font-weight: 700;
  display: flex;
  justify-content: center;
  align-items: center;
  background: rebeccapurple;
  width: 100%;
  height: 60px;
  top: 2px;
  box-sizing: border-box;
  position: sticky;}
  .logoAlura{
    align-items: center;
    background: rgb(189, 38, 38);
    box-sizing: border-box; 
    display:flex;
    font-size: 25px;
    justify-content: center;
    margin: 2px;
    height: 50px;
    width: 200px;}
  .sobreNosotros{
    background:rgb(44, 44, 182);
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    line-height: 0;
    margin: 2px;
    height: 200px;
    width: 200px;}
  .formulario{
    align-items: center;
    background: rgb(69, 214, 56);
    box-sizing: border-box; 
    display:flex;
    font-size: 25px;
    height: 200px;
    justify-content: center;
    margin: 2px;
    width: 200px;}
  .contenedor__informacionP{
    font-size: 12px;
    font-weight: 600;}
  .cajas{
    height: 150px;
    width: 80%;
    display: block;
    border: 2px solid palevioletred;
    margin: 1rem;
    background: rgb(228, 166, 112);}
    
    .container-cajas{
      display: flex;
      flex-direction: column;
      align-items: center;}
   
    div.cajas{
      text-align: center;
      width: 100%;
    }
    .caja0{
      background: rgb(0, 0, 0);
      /* order: 3; */
      color: aliceblue;
    }
  .caja1{
    background: orangered;
  order: -1;
  color: aqua;}
  .caja2{
    background: orange;
    color: aqua;
    order: 2;}
  .caja3{
    background: paleturquoise;}
  .caja4{
    background: plum;}
  .caja5{
    background: royalblue;}
  .caja6{
    background: yellowgreen;}
  .caja7{
    background: 
    linear-gradient(217deg, rgba(255,0,0,.8), rgba(255,0,0,0) 70.71%),/*el '0.8' es la intensidad. De nada!*/
    linear-gradient(127deg, rgba(0,255,0,.8), rgba(0,255,0,0) 70.71%),
    linear-gradient(336deg, rgba(0, 0, 255, 0.8), rgba(0,0,255,0) 70.71%);}
  .caja8{
    background: blueviolet;}
  .caja9{
    background: linear-gradient(green 80%, red);} /*si le pongo(10deg,green 80%, red) invierto el orden de los colores*/
  .caja10{
    order: -2;
    background: blue;}



  
@media (max-width:638px){
  .logoAluraYsobreNosotros{
    flex-direction: column;
  }
}
</style>

  </head>
  <body>
    <div class="fixed">Fixed + top:0 (flotante)</div>
    <div class="contenedor">
      <div class="logoAluraYsobreNosotros">
        <div class="hijos logoAlura">Logo Alura</div>
        <div class="sobreNosotros">
          <p class="contenedor__informacionP">Quienes somos</a></p>
          <p class="contenedor__informacionP">Politica de privacidad</a></p>
          <p class="contenedor__informacionP">Programa de fidelidad</a></p>
          <p class="contenedor__informacionP">Nuestras tiendas</a></p>
          <p class="contenedor__informacionP">Quiero ser franquiciado</a></p>
          <p class="contenedor__informacionP">Anuncie aqui</a></p>
        </div>
      </div>
      <div class="hijos formulario">Formulario</div>
    </div>
      <div class="container-cajas">
        <div class="cajas caja0"><h1>0</h1></div>
        <div class="cajas caja1"><h1>1</h1></div>
        <div class="cajas caja2"><h1>2</h1></div>
        <div class="cajas caja3"><h1>3</h1></div>
        <div class="cajas caja4"><h1>4</h1></div>
        <div class="cajas caja5"><h1>5</h1></div>
        <div class="cajas caja6"><h1>6</h1></div>
        <div class="cajas caja7"><h1>7</h1></div>
        <div class="cajas caja8"><h1>8</h1></div>
        <div class="cajas caja9"><h1>9</h1></div>
        <div class="cajas caja10"><h1>10</h1></div>
    </div>
    

    <script src="https://kit.fontawesome.com/89b03c48a4.js" crossorigin="anonymous"></script>
  </body>
</html>
